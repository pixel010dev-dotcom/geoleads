name: Drip Email Cron

on:
  schedule:
    - cron: '0 * * * *'  # every hour

jobs:
  process-drip:
    runs-on: ubuntu-latest
    steps:
      - name: Process drip emails
        run: curl -s "${{ secrets.APP_URL || 'https://geoleads-production-6583.up.railway.app' }}/api/drip/process?secret=${{ secrets.CRON_SECRET }}"
