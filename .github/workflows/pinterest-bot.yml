name: Pinterest Bot

on:
  schedule:
    - cron: '0 10,18 * * *'  # 2x/day: 10am, 6pm
  workflow_dispatch:

jobs:
  pin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create pin
        env:
          PINTEREST_TOKEN: ${{ secrets.PINTEREST_TOKEN }}
        run: python scripts/pinterest-bot.py
