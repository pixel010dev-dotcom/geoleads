[build]
builder = "DOCKERFILE"
dockerfilePath = "dashboard/Dockerfile"

[deploy]
runtime = "LEGACY"
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ALWAYS"
restartPolicyMaxRetries = 5

[[cron.jobs]]
schedule = "0 * * * *"
command = "curl -s ${{APP_URL}}/api/drip/process"

[[cron.jobs]]
schedule = "0 8 * * *"
command = "curl -s ${{APP_URL}}/api/drip/process || true"

[[cron.jobs]]
schedule = "*/10 * * * *"
command = "curl -s ${{APP_URL}}/api/cron/process-campaigns?secret=${{CRON_SECRET}} || true"

[[cron.jobs]]
schedule = "*/15 * * * *"
command = "curl -s ${{APP_URL}}/api/cron/process-followups?secret=${{CRON_SECRET}} || true"

[[cron.jobs]]
schedule = "*/30 * * * *"
command = "curl -s ${{APP_URL}}/api/cron?secret=${{CRON_SECRET}} || true"
