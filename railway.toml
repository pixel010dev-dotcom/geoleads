[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[cron.jobs]]
schedule = "0 * * * *"
command = "curl -s https://geoleads-production.up.railway.app/api/drip/process"

[[cron.jobs]]
schedule = "0 8 * * *"
command = "curl -s https://geoleads-production.up.railway.app/api/drip/process || true"
