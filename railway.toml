[build]
builder = "DOCKERFILE"
dockerfilePath = "dashboard/Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ALWAYS"
restartPolicyMaxRetries = 3
startCommand = "npm run start"

[[cron.jobs]]
schedule = "0 * * * *"
command = "curl -s https://geoleads-production.up.railway.app/api/drip/process"

[[cron.jobs]]
schedule = "0 8 * * *"
command = "curl -s https://geoleads-production.up.railway.app/api/drip/process || true"
