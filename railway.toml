[build]
builder = "DOCKERFILE"
dockerfilePath = "dashboard/Dockerfile"

[deploy]
runtime = "LEGACY"
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ALWAYS"
restartPolicyMaxRetries = 5

[[cron.jobs]]
schedule = "0 * * * *"
command = "curl -s https://geoleads-production-6583.up.railway.app/api/drip/process"

[[cron.jobs]]
schedule = "0 8 * * *"
command = "curl -s https://geoleads-production-6583.up.railway.app/api/drip/process || true"
