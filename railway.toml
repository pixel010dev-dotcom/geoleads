[build]
builder = "NIXPACKS"
buildCommand = "cd dashboard && npm install && npm run build"

[deploy]
startCommand = "cd dashboard && npm run start"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[cron.jobs]]
schedule = "0 * * * *"
command = "curl -s https://geoleads-production.up.railway.app/api/drip/process"

[[cron.jobs]]
schedule = "0 8 * * *"
command = "curl -s https://geoleads-production.up.railway.app/api/drip/process || true"
